name: Send Dependabot PRs to Slack

on:
  workflow_call:
    secrets:
      slack_webhook_url:
        required: true
  push:
    branches:
      - 'dependabot/**'

permissions:
  contents: read
  id-token: write

jobs:
  RunTerraformValidation:
    name: Run Dependabot PR Review
    runs-on: ubuntu-latest

    steps:
      - name: Send Dependabot PR to Slack
      ## slack-github-action@v1.26.0
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "New ${{ github.repository }} Dependabot PR Available for Review:\n${{ github.event.pull_request.html_url || github.event.head_commit.url }}"
            }